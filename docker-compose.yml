services:
  db:
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=promptvault_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptvault_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cloud-network

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    ports:
      - "8081:8081"
    expose:
      - "8081"
    environment:
      - DB_NAME=promptvault_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,nginx
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloud-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - cloud-network
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    networks:
      - cloud-network
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles

networks:
  cloud-network:
    driver: bridge

volumes:
  postgres_data:
  static_volume: