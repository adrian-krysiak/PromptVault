services:
  db:
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=promptvault_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptvault_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cloud-network

  backend:
    build: ./backend
    # command: python manage.py runserver 0.0.0.0:8081
    volumes:
      - ./backend:/app
    ports:
      - "8081:8081"
    environment:
      - DB_NAME=promptvault_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloud-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge

volumes:
  postgres_data: